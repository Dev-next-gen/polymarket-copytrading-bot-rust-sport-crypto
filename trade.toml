# CLOB API base URL (mainnet)
clob_host = "https://clob.polymarket.com"

chain_id = 137

# Web UI port
port = 8000

# When true, log trades but do not execute (use --simulation or set to false for live)
simulation = false

[copy]
# Leader address(es) to copy
target_address = [
    "0x99ddb04e62a8362d4606dd44508be6ec584b2add"
]
# For these leaders only: first BUY per market is copied (by slug; else condition id; else token).
# Add any choppy wallet here; other targets copy every trade as usual. Resets if the bot restarts.
once_per_slug_addresses = [
    "0x99ddb04e62a8362d4606dd44508be6ec584b2add"
]
revert_trade = false
size_multiplier = 0
# Fixed USD per copy (0 = off). When set, each BUY uses this USDC notional; each SELL sells up to
# this much USD in shares at the trade price (capped by the leader's sell size). Ignores size_multiplier.
copy_fixed_usd = 7
# How often to refresh positions in the Web UI (seconds). Copy-trading uses the
# Polymarket activity WebSocket for fills, not this poll. Lower = snappier portfolio UI only.
poll_interval_sec = 0.5

[exit]
take_profit = 0
stop_loss = 0
trailing_stop = 0

[filter]
buy_amount_limit_in_usd = 0
entry_trade_sec = 0
trade_sec_from_resolve = 0

[ui]
delta_highlight_sec = 10
delta_animation_sec = 2
